services:
  rtabmap:
    image: ${RTABMAP_IMAGE:-gassian/robot-runtime:latest}
    container_name: ${RTABMAP_CONTAINER:-ros_humble_rtabmap}
    network_mode: host
    ipc: host
    privileged: true
    stdin_open: true
    tty: true
    working_dir: /robot_ws
    volumes:
      - ${WORKSPACE_DIR:-$HOME/robot_ws}:/robot_ws
      - ${RUNS_DIR:-$PWD/runs}:/runs
    devices:
      - /dev/bus/usb:/dev/bus/usb
    command: bash -lc "source /opt/ros/humble/setup.bash && exec bash"

  robot_runtime:
    image: ${ROBOT_RUNTIME_IMAGE:-gassian/robot-runtime:latest}
    build:
      context: ..
      dockerfile: docker/robot_runtime.Dockerfile
    container_name: ${ROBOT_RUNTIME_CONTAINER:-ros_humble_robot_runtime}
    network_mode: host
    ipc: host
    privileged: true
    stdin_open: true
    tty: true
    working_dir: /robot_ws
    environment:
      ROS_IMAGE: ${ROBOT_RUNTIME_IMAGE:-gassian/robot-runtime:latest}
      ROS_CONTAINER: ${ROBOT_RUNTIME_CONTAINER:-ros_humble_robot_runtime}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      ROS_LOCALHOST_ONLY: ${ROS_LOCALHOST_ONLY:-0}
      DDS_IFACE: ${DDS_IFACE:-l4tbr0}
      DDS_INCLUDE_LOOPBACK: ${DDS_INCLUDE_LOOPBACK:-0}
    volumes:
      - ${WORKSPACE_DIR:-..}:/robot_ws
      - ${RUNS_DIR:-../runs}:/runs
      - /dev:/dev
      - /run/udev:/run/udev:ro
    command: bash -lc "source /opt/ros/humble/setup.bash && exec bash"

  gsplat_train:
    image: ${TRAIN_IMAGE:-gassian/gsplat-train:latest}
    container_name: ${TRAIN_CONTAINER:-gsplat_train}
    network_mode: host
    ipc: host
    runtime: nvidia
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - ${RUNS_DIR:-$PWD/runs}:/workspace/runs
      - ${WORKSPACE_DIR:-$HOME/robot_ws}:/workspace/robot_ws
    command: bash -lc "python3 --version && exec bash"
